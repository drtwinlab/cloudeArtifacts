<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hallo von Claude!</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 20% 50%, rgba(99, 66, 245, 0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 20%, rgba(56, 189, 248, 0.12) 0%, transparent 50%),
                  radial-gradient(ellipse at 60% 80%, rgba(244, 63, 94, 0.1) 0%, transparent 50%);
      animation: bgShift 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes bgShift {
      from { filter: hue-rotate(0deg); }
      to   { filter: hue-rotate(30deg); }
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 60px 70px;
      max-width: 640px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 60px rgba(0,0,0,0.4);
      animation: fadeUp 0.8s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #6342f5, #38bdf8);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 100px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 18px;
      background: linear-gradient(135deg, #fff 30%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .stats {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .stat {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 24px;
      flex: 1;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(135deg, #6342f5, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 4px;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #6342f5, #38bdf8);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      padding: 14px 36px;
      border-radius: 100px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 30px rgba(99, 66, 245, 0.4);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px rgba(99, 66, 245, 0.6);
    }

    .footer {
      margin-top: 32px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.25);
    }

    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }

    @keyframes float {
      0%   { transform: translateY(110vh) scale(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="particles" id="particles"></div>

  <div class="card">
    <div class="badge">Funktioniert ✓</div>
    <h1>Hallo,&nbsp;Rostyslav!</h1>
    <p>Diese Website wurde von Claude über den Hostinger-MCP-Connector erstellt und veröffentlicht — direkt aus dem Chat heraus, ohne manuellen Eingriff.</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="counter">1</div>
        <div class="stat-label">Besuche</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="timer">12s</div>
        <div class="stat-label">Auf der Seite</div>
      </div>
    </div>

    <button class="btn" onclick="celebrate()">Klick mich 🎉</button>

    <div class="footer">Bereitgestellt über Hostinger MCP · Claude Sonnet 4.6 · 2026</div>
  </div>

  <script>
    const key = 'visit_count';
    let count = parseInt(sessionStorage.getItem(key) || '0') + 1;
    sessionStorage.setItem(key, count);
    document.getElementById('counter').textContent = count;

    let secs = 0;
    setInterval(() => {
      secs++;
      document.getElementById('timer').textContent = secs + 's';
    }, 1000);

    const container = document.getElementById('particles');
    const colors = ['#6342f5', '#38bdf8', '#f43f5e', '#f59e0b', '#10b981'];
    for (let i = 0; i < 25; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 8 + 4;
      p.style.cssText = `
        width: ${size}px; height: ${size}px;
        left: ${Math.random() * 100}%;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 12 + 8}s;
        animation-delay: ${Math.random() * 10}s;
      `;
      container.appendChild(p);
    }

    function celebrate() {
      const burst = [];
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 12 + 6;
        p.style.cssText = `
          width: ${size}px; height: ${size}px;
          left: ${Math.random() * 100}%;
          background: ${colors[Math.floor(Math.random() * colors.length)]};
          animation-duration: ${Math.random() * 4 + 2}s;
          animation-delay: 0s;
        `;
        container.appendChild(p);
        burst.push(p);
      }
      setTimeout(() => burst.forEach(p => p.remove()), 6000);
    }
  </script>

</body>
</html>
